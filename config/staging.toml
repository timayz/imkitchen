[server]
host = "0.0.0.0"
port = 3000
environment = "staging"

[database]
url = "sqlite:/data/imkitchen.db"
max_connections = 10
acquire_timeout = 30

[logging]
level = "debug"
format = "json"
access_logs = true

[security]
session_timeout = "24h"
cors_origins = ["https://staging.imkitchen.app", "http://localhost:3001"]
csrf_protection = true

[features]
registration_enabled = true
email_verification = false
rate_limiting = false
analytics = false

[performance]
request_timeout = "30s"
keep_alive = "60s"
max_request_size = "10MB"

[monitoring]
metrics_enabled = true
health_check_enabled = true
structured_logging = true