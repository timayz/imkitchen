{% extends "_base.html" %}
{%- import "_footer.html" as scope -%}

{% block body %}

<body class="bg-cream">
  <!-- Navigation -->
  <nav class="bg-cream border-b border-line-2 h-16">

  <div class="container mx-auto px-4 h-full">
    <div class="flex items-center justify-between h-full">
      <a href="/" class="text-2xl font-serif text-ink">🍳 imkitchen</a>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex gap-4 items-center">
        <a href="/login" class="px-4 py-2 text-ink-2 font-medium text-sm hover:text-ink rounded-xl transition">{{ "Login"|t }}</a>
        <a href="/register"
          class="px-5 py-2 bg-ink text-cream font-semibold text-sm rounded-xl hover:bg-ink-2 transition">{{ "Get Started"|t }}</a>
      </div>

      <!-- Mobile Menu Button -->
      <label for="mobile-menu-button" class="md:hidden p-2 hover:bg-cream-2 rounded-xl transition">
        <svg class="w-6 h-6 text-ink" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </label>
    </div>

    <input id="mobile-menu-button" type="checkbox">

    <!-- Mobile Navigation -->
    <div id="mobile-menu" class="hidden md:hidden mt-4 pb-4">
      <div class="flex flex-col gap-2">
        <a href="/login" class="px-4 py-3 text-ink-2 hover:bg-cream-2 rounded-xl transition text-center">{{ "Login"|t }}</a>
        <a href="/register"
          class="px-4 py-3 bg-ink text-cream font-semibold rounded-xl hover:bg-ink-2 transition text-center">
          {{ "Get Started"|t }}</a>
      </div>
    </div>
  </div>

  </nav>

  <!-- Hero Section -->
  {% block hero %}{% endblock %}

  <!-- Main Content -->
  {% block content %}{% endblock %}

  <!-- Footer -->
  {% call scope::footer() %}
  {% endcall %}

  <!-- Toast Container (Fixed Position) -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 max-w-md">
      <!-- Toasts will be dynamically added here -->
  </div>
</body>
{% endblock %}
