{% extends "_base.html" %}

{% block title %}{{ "Create New Password"|t }} - imkitchen{% endblock %}

{% block body %}
<body class="bg-cream">
    <!-- Navigation -->
    <nav class="bg-cream border-b border-line-2 h-16">
        <div class="container mx-auto px-4 h-full flex items-center justify-between">
            <a href="/index" class="text-2xl font-serif text-ink">🍳 imkitchen</a>
        </div>
    </nav>

    <!-- Reset Password Form -->
    <div class="container mx-auto px-4 py-16 max-w-md">
        <div class="bg-paper rounded-2xl shadow-md border border-line-2 p-8">
            <h1 class="text-3xl font-serif font-bold mb-2 text-center text-ink">{{ "Create New Password"|t }}</h1>
            <p class="text-ink-2 text-center mb-8">{{ "Enter your new password below"|t }}</p>

            <form action="/reset-password/new/{{ id }}" method="post" ts-req="" ts-target="parent div">
                <div class="mb-6">
                    <label for="password" class="block text-sm font-semibold text-ink-2 mb-2">{{ "New Password"|t }}</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        class="w-full px-4 py-3 border border-line rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                        required
                    />
                    <p class="text-xs text-ink-3 mt-2">{{ "Must be at least 8 characters long"|t }}</p>
                </div>

                <div class="mb-6">
                    <label for="confirm-password" class="block text-sm font-semibold text-ink-2 mb-2">{{ "Confirm Password"|t }}</label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="••••••••"
                        class="w-full px-4 py-3 border border-line rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent"
                        required
                    />
                </div>

                <button
                    type="submit"
                    class="w-full bg-primary-500 text-white font-semibold py-3 rounded-xl hover:bg-primary-600 transition"
                >
                    {{ "Reset Password"|t }}
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-ink-2 text-sm">
                    <a href="/login" class="text-primary-500 font-semibold hover:text-primary-600">{{ "Back to login"|t }}</a>
                </p>
            </div>
        </div>
    </div>
      <!-- Toast Container (Fixed Position) -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 max-w-md">
      <!-- Toasts will be dynamically added here -->
  </div>

</body>
{% endblock %}
