{% extends "_base.html" %}

{% block body %}

<body class="bg-cream pb-20 md:pb-0">
  <!-- Top Navigation -->
  <nav class="bg-ink text-cream shadow-md h-16">
    <div class="container mx-auto px-4 h-full">
      <div class="flex items-center justify-between h-full">
        <a href="/" class="text-xl md:text-2xl font-serif text-primary-400">🍳 Admin</a>

        <!-- Desktop Navigation -->
        <div class="hidden md:flex gap-6 items-center">
          <a href="/admin/users" {% if current_path=="users" %} class="text-cream font-semibold" {% else %}
            class="text-cream/60 hover:text-cream transition" {% endif %}>
            Users
          </a>
          <a href="/admin/recipes/import" {% if current_path=="recipes" %} class="text-cream font-semibold" {% else %}
            class="text-cream/60 hover:text-cream transition" {% endif %}>
            Recipes
          </a>
          <a href="/admin/invoices" {% if current_path=="invoices" %} class="text-cream font-semibold" {% else %}
            class="text-cream/60 hover:text-cream transition" {% endif %}>
            Invoices
          </a>
          <a href="/admin/contact" {% if current_path=="contact" %} class="text-cream font-semibold" {% else %}
            class="text-cream/60 hover:text-cream transition" {% endif %}>
            Contact Inbox
          </a>
        </div>

        <div class="hidden md:flex items-center gap-4">
        </div>
      </div>
    </div>
  </nav>

  <!-- Mobile Bottom Navigation -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-ink border-t border-cream/10 z-50">
    <div class="flex items-center justify-around">
      <a href="/admin/users" {% if current_path=="users" %}class="flex flex-col items-center py-2 px-3 text-cream" {%
        else %}class="flex flex-col items-center py-2 px-3 text-cream/50" {% endif %}>
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
          </path>
        </svg>
        <span class="text-xs mt-1 font-semibold">Users</span>
      </a>
      <a href="/admin/recipes/import" {% if current_path=="recipes" %}class="flex flex-col items-center py-2 px-3 text-cream"
        {% else %}class="flex flex-col items-center py-2 px-3 text-cream/50" {% endif %}>
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12">
          </path>
        </svg>
        <span class="text-xs mt-1">Recipes</span>
      </a>
      <a href="/admin/invoices" {% if current_path=="invoices" %}class="flex flex-col items-center py-2 px-3 text-cream"
        {% else %}class="flex flex-col items-center py-2 px-3 text-cream/50" {% endif %}>
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
          </path>
        </svg>
        <span class="text-xs mt-1">Invoices</span>
      </a>
      <a href="/admin/contact" {% if current_path=="contact" %}class="flex flex-col items-center py-2 px-3 text-cream"
        {% else %}class="flex flex-col items-center py-2 px-3 text-cream/50" {% endif %}>
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
          </path>
        </svg>
        <span class="text-xs mt-1">Contact</span>
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  {% block content %}
  {% endblock %}

  <!-- Toast Container (Fixed Position) -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 max-w-md">
      <!-- Toasts will be dynamically added here -->
  </div>
</body>
{% endblock %}
