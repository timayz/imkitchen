<!DOCTYPE html>
<html lang="{{ "html_lang"|t }}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="{% block meta_description %}Intelligent meal planning and cooking optimization{% endblock %}">

  <title>{% block title %}imkitchen{% endblock %}</title>

  <!-- Canonical URL -->
  {% block canonical %}{% endblock %}

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="imkitchen">
  <meta property="og:title" content="{% block og_title %}imkitchen - Intelligent Meal Planning{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Intelligent meal planning and cooking optimization{% endblock %}">
  <meta property="og:image" content="{% block og_image %}https://imkitchen.app/static/icons/icon-512.png{% endblock %}">
  {% block og_url %}{% endblock %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="{% block twitter_card %}summary{% endblock %}">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href={{ "/static/icons/icon-192.png?v=" ~ env!("CARGO_PKG_VERSION") }}>

  <!-- PWA Manifest -->
  <link rel="manifest" href={{ "/manifest.json?v=" ~ env!("CARGO_PKG_VERSION") }}>
  <meta name="theme-color" content="#ef6c1e">

  <!-- iOS PWA Support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="imkitchen">
  <link rel="apple-touch-icon" href={{ "/static/icons/apple-touch-icon.png?v=" ~ env!("CARGO_PKG_VERSION") }}>

  <!-- DNS prefetch for external origins -->
  {% block dns_prefetch %}{% endblock %}

  <!-- Google Fonts: Fraunces (serif headings) + Inter (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Preload font files to flatten critical chain (avoid HTML → CSS → font waterfall) -->
  <link rel="preload" as="font" type="font/woff2" crossorigin
    href="https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7W0Q5nw.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin
    href="https://fonts.gstatic.com/s/fraunces/v38/6NU78FyLNQOQZAnv9bYEvDiIdE9Ea92uemAk_WBq8U_9v0c2Wa0KxC9TeP2Xz5c.woff2">
  <link rel="preload" as="font" type="font/woff2" crossorigin
    href="https://fonts.gstatic.com/s/fraunces/v38/6NU58FyLNQOQZAnv9ZwNjucMHVn85Ni7emAe9lKqZTnbB-gzTK0K1ChjeveQ7ZXk8g.woff2">

  <!-- Load Google Fonts CSS asynchronously to avoid render-blocking -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet">
  </noscript>

  <!-- Main CSS - loaded synchronously to prevent visual breaking -->
  <link rel="stylesheet" href={{ "/static/css/main.css?v=" ~ env!("CARGO_PKG_VERSION") }}>

  <!-- Core scripts (loaded on all pages) -->
  <script src={{ "/static/js/twinspark.js?v=" ~ env!("CARGO_PKG_VERSION") }} defer></script>
  <script>
    window._ts_func = window._ts_func || {};
    window._ts_func.lazy = function (o) {
      var img = o.el;
      var picture = img.parentElement;

      // Activate <source> elements
      if (picture && picture.tagName === 'PICTURE') {
        var sources = picture.querySelectorAll('source[data-srcset]');
        for (var i = 0; i < sources.length; i++) {
          sources[i].srcset = sources[i].dataset.srcset;
          sources[i].media = sources[i].dataset.media;
        }
      }

      // Activate <img>
      if (img.dataset.src) img.src = img.dataset.src;
      if (img.dataset.srcset) img.srcset = img.dataset.srcset;
      if (img.dataset.sizes) img.sizes = img.dataset.sizes;

      img.onload = function () {
        img.classList.add('loaded');
        var placeholder = picture
          ? picture.parentElement.querySelector('.animate-pulse')
          : img.parentElement.querySelector('.animate-pulse');
        if (placeholder) placeholder.remove();
      };
    };
  </script>

  <!-- PWA scripts (loaded on all pages for PWA functionality) -->
  <script src={{ "/static/js/pwa-install.js?v=" ~ env!("CARGO_PKG_VERSION") }} defer></script>
  <script src={{ "/static/js/sw-register.js?v=" ~ env!("CARGO_PKG_VERSION") }} defer></script>

  <!-- Page-specific scripts (override in child templates) -->
  {% block page_scripts %}{% endblock %}

  {% block extra_head %}{% endblock %}

  <style>
    /* Fallback font metrics to reduce CLS during font swap */
    @font-face {
      font-family: 'Inter fallback';
      src: local('Arial');
      size-adjust: 107%;
      ascent-override: 90%;
      descent-override: 22%;
      line-gap-override: 0%;
    }

    @font-face {
      font-family: 'Fraunces fallback';
      src: local('Georgia');
      size-adjust: 105%;
      ascent-override: 98%;
      descent-override: 27%;
      line-gap-override: 0%;
    }

    #mobile-menu-button {
      appearance: none;
      opacity: 0;
      width: 0;
      height: 0;
      position: fixed;
    }

    :where(#mobile-menu-button:checked ~ #mobile-menu) {
      display: block;
    }
  </style>
</head>
{% block body %}{% endblock body %}

</html>
