<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ImKitchen{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="/static/js/twinspark.js" defer></script>
    <script src="/static/js/alpine.min.js" defer></script>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <a href="/">ImKitchen</a>
            </div>
            <div class="nav-menu">
                {% block navigation %}
                <a href="/">Home</a>
                <a href="/recipes">Recipes</a>
                <a href="/planner">Meal Planner</a>
                {% endblock %}
            </div>
        </nav>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 ImKitchen - Recipe Management Platform</p>
    </footer>

    <script src="/static/js/app.js"></script>
</body>
</html>
