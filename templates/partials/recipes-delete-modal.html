<div id="delete-confirm" class="fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4">
  <div class="bg-paper rounded-xl shadow-md max-w-md w-full">
    <div class="p-6">
      <div class="flex items-start gap-4">
        <div class="shrink-0 w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
          <svg class="w-6 h-6 text-[#c3321a]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
            </path>
          </svg>
        </div>
        <div class="flex-1">
          <h3 class="text-lg font-bold mb-2">{{ "Delete Recipe?"|t }}</h3>
          <p class="text-ink-2 text-sm">
            {{ "Are you sure you want to delete this recipe? This action cannot be undone."|t }}
          </p>
        </div>
      </div>
    </div>
    <div id="error-message"></div>
    <div class="flex flex-col-reverse md:flex-row gap-3 p-6 border-t bg-cream">
      <button ts-trigger="click" ts-action="remove #delete-confirm"
        class="flex-1 px-4 py-2 bg-cream-2 text-ink-2 font-semibold rounded-xl hover:bg-cream-2">
        {{ "Cancel"|t }}
      </button>
      <button ts-trigger="click" ts-req="/recipes/{{ id }}/delete" ts-req-method="POST"
        class="flex-1 px-4 py-2 bg-[#c3321a] text-white font-semibold rounded-xl hover:bg-[#a82a16] cursor-pointer">
        {{ "Delete"|t }}
      </button>
    </div>
  </div>
</div>
