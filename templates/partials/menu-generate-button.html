{% match status %}
{% when TemplateStatus::Pending %}
<button id="generate-button" disabled class="flex-1 px-4 py-2 bg-red-600 text-white font-semibold rounded-lg">
  <div class="animate-spin rounded-full h-5 w-5 border-2 border-red-200 border-t-red-600 shrink-0 m-auto"></div>
</button>
<div ts-swap="append" ts-swap-push="body" ts-trigger="load delay 300ms" ts-req="/menu/{{ date }}/generate/status"></div>
{% when TemplateStatus::Checking %}
<div ts-trigger="load delay 600ms" ts-req="/menu/{{ date }}/generate/status"></div>
{% when TemplateStatus::Idle %}
<div ts-trigger="load" ts-action="remove"></div>
<button id="generate-button" ts-swap-push="#generate-button" ts-trigger="click" ts-req="/menu/{{ date }}/generate"
  ts-req-method="POST"
  class="flex-1 px-4 py-2 bg-red-600 text-white font-semibold rounded-lg hover:bg-red-700 cursor-pointer">
  {{ "Generate"|t }}
</button>
{% endmatch %}
