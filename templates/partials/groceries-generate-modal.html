<div id="modal-generate" class="fixed inset-0 bg-black/50 z-40 flex items-center justify-center p-4">
  <form ts-req="/groceries/generate" ts-req-method="post" class="bg-paper rounded-xl shadow-md max-w-md w-full"
    ts-target="#modal-generate button:not([type])">
    <!-- Header -->
    <div class="flex items-center justify-between p-6 border-b">
      <h3 class="text-xl font-bold">{{ "Generate Shopping List"|t }}</h3>
      <button type="button" ts-trigger="click" ts-action="remove #modal-generate"
        class="text-ink-3 hover:text-ink-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    <!-- Body -->
    <div class="p-6">
      <p class="text-ink-2 text-sm mb-4">{{ "Generate a shopping list from your meal plan. Choose how many days ahead
        to include."|t }}</p>
      <div>
        <label class="block text-sm font-semibold text-ink-2 mb-2">{{ "Days from now"|t }}</label>
        <input type="number" id="generate-days" name="days" value="7" min="1" max="30"
          class="w-full px-4 py-2 border border-line rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-primary-500" />
        <p class="text-xs text-ink-3 mt-1">{{ "Include meals planned for the next 1-30 days"|t }}</p>
      </div>
    </div>
    <!-- Footer -->
    <div class="flex flex-col-reverse md:flex-row gap-3 p-6 border-t bg-cream">
      <button type="button" ts-trigger="click" ts-action="remove #modal-generate"
        class="flex-1 px-4 py-2 bg-cream-2 text-ink-2 font-semibold rounded-xl hover:bg-cream-2">
        {{ "Cancel"|t }}
      </button>
      <button class="flex-1 px-4 py-2 bg-primary-500 text-white font-semibold rounded-xl hover:bg-primary-600">
        {{ "Generate"|t }}
      </button>
    </div>
  </form>
</div>
