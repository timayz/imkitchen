{% match status %}
{% when TemplateStatus::Pending %}
<button disabled class="flex-1 px-4 py-2 bg-primary-500 text-white font-semibold rounded-xl hover:bg-primary-600">
  <div class="animate-spin rounded-full h-5 w-5 border-2 border-primary-500/20 border-t-primary-500 shrink-0 m-auto"></div>
</button>
<div ts-swap="append" ts-swap-push="body" ts-trigger="load delay 300ms" ts-req="/groceries/generate/status"></div>
{% when TemplateStatus::Checking %}
<div ts-trigger="load delay 600ms" ts-req="/groceries/generate/status"></div>
{% when TemplateStatus::Idle %}
<div ts-trigger="load" ts-action="remove"></div>
<button class="flex-1 px-4 py-2 bg-primary-500 text-white font-semibold rounded-xl hover:bg-primary-600">
  {{ "Generate"|t }}
</button>
{% endmatch %}
