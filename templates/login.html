{% extends "_base.html" %}

{% block title %}{{ "Login"|t }} - imkitchen{% endblock %}

{% block body %}

<body class="bg-cream">
  <!-- Navigation -->
  <nav class="bg-cream border-b border-line-2 h-16">
    <div class="container mx-auto px-4 h-full flex items-center justify-between">
      <a href="/" class="text-2xl font-serif text-ink">🍳 imkitchen</a>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="container mx-auto px-4 py-16 max-w-md">
    <div class="bg-paper rounded-2xl shadow-md border border-line-2 p-8">
      <h1 class="text-3xl font-serif font-bold mb-2 text-center text-ink">{{ "Welcome Back"|t }}</h1>
      <p class="text-ink-2 text-center mb-8">{{ "Log in to access your meal plans"|t }}</p>

      <form action="/login" method="post" ts-req="" ts-target="form button" ts-swap="skip">
        <div class="mb-6">
          <label for="email" class="block text-sm font-semibold text-ink-2 mb-2">{{ "Email Address"|t }}</label>
          <input type="email" id="email" name="email" placeholder="{{ "you@example.com"|t }}"
            class="w-full px-4 py-3 border border-line rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent"
            {% if let Some(email) = email %} value="{{ email }}"{% endif %}
            autocomplete="new-email" required />
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-semibold text-ink-2 mb-2">{{ "Password"|t }}</label>
          <input type="password" id="password" name="password" placeholder="••••••••"
            class="w-full px-4 py-3 border border-line rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent"
            {% if let Some(password) = password %} value="{{ password }}"{% endif %}
            autocomplete="new-password" required />
        </div>

        <div class="flex items-center justify-between mb-6">
          <div class="flex items-center"></div>
          <a href="/reset-password" class="text-sm text-primary-500 hover:text-primary-600">{{ "Forgot password?"|t }}</a>
        </div>

        <button type="submit"
          class="w-full bg-primary-500 text-white font-semibold py-3 rounded-xl hover:bg-primary-600 transition cursor-pointer">
          {{ "Log In"|t }}
        </button>
      </form>

      <div class="mt-6 text-center">
        <p class="text-ink-2 text-sm">
          {{ "Don't have an account?"|t }}
          <a href="/register" class="text-primary-500 font-semibold hover:text-primary-600">{{ "Sign up free"|t }}</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Toast Container (Fixed Position) -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2 max-w-md">
      <!-- Toasts will be dynamically added here -->
  </div>
</body>
{% endblock %}
