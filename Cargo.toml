[workspace]
resolver = "2"
members = [
    "crates/imkitchen-shared",
    "crates/imkitchen-web",
    "crates/imkitchen-user", 
    "crates/imkitchen-recipe",
    "crates/imkitchen-meal-planning",
    "crates/imkitchen-shopping",
    "crates/imkitchen-notification",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.90"
authors = ["IMKitchen Team"]
license = "MIT"
repository = "https://github.com/snapiz/imkitchen"

[workspace.dependencies]
# Currently used core dependencies
tokio = { version = "1.0", features = ["full"] }
axum = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
validator = { version = "0.20", features = ["derive"] }

tracing-appender = "0.2"
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite", "migrate"] }
evento = { version = "1.1", features = ["sqlite-migrator"] } 
# askama = "0.14"
# askama_axum = "0.4" 
prometheus = "0.13"
anyhow = "1.0"
thiserror = "1.0"  # Re-enabled for workspace

# CLI binary crate
[[bin]]
name = "imkitchen"
path = "src/main.rs"

[package]
name = "imkitchen"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# CLI dependencies
clap = { workspace = true }
tokio = { workspace = true, features = ["signal"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
anyhow = { workspace = true }
sqlx = { workspace = true }
uuid = { workspace = true }
validator = { workspace = true }
serde = { workspace = true }
toml = "0.8"
thiserror = { workspace = true }
libc = "0.2"

# Internal crates
imkitchen-web = { path = "crates/imkitchen-web" }
# imkitchen-shared = { path = "crates/imkitchen-shared" }

[dev-dependencies]
tempfile = "3.0"
tokio-test = "0.4"
axum = { workspace = true }
tower = "0.5"
futures = "0.3"
serde_json = "1.0"
