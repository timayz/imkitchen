[workspace]
resolver = "2"
members = [
    "crates/imkitchen-shared",
    "crates/imkitchen-user", 
    "crates/imkitchen-recipe",
    "crates/imkitchen-meal-planning",
    "crates/imkitchen-shopping",
    "crates/imkitchen-notification",
    "crates/imkitchen-web",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.90"
authors = ["IMKitchen Team"]
license = "MIT"
repository = "https://github.com/snapiz/imkitchen"

[workspace.dependencies]
# Core dependencies with exact versions from tech stack
tokio = { version = "1.0", features = ["full"] }
axum = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json"] }
tracing-appender = "0.2"
clap = { version = "4.5", features = ["derive"] }
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite"] }
# evento = { version = "1.1", features = ["sqlite-migrator"] }  # TODO: Fix compilation issues
askama = "0.14"
askama_axum = "0.4"
validator = { version = "0.20", features = ["derive"] }
prometheus = "0.13"
serde = { version = "1.0", features = ["derive"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
thiserror = "1.0"

# CLI binary crate
[[bin]]
name = "imkitchen"
path = "src/main.rs"

[package]
name = "imkitchen"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
# CLI dependencies
clap = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }

# Internal crates
imkitchen-web = { path = "crates/imkitchen-web" }
imkitchen-shared = { path = "crates/imkitchen-shared" }
