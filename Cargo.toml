[package]
name = "imkitchen"
version = "0.1.0"
edition = "2021"

[dependencies]
# Web framework
axum = "0.8"
tower = "0.4"
tower-http = { version = "0.5", features = ["fs", "cors", "trace"] }
tokio = { version = "1.0", features = ["full"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "chrono", "json"] }
uuid = { version = "1.0", features = ["v4", "serde"] }

# Redis
redis = { version = "0.25", features = ["tokio-comp"] }

# Templating
askama = "0.14"
askama_axum = "0.4"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Authentication
jsonwebtoken = "9.3"

# Configuration
dotenvy = "0.15"

# Error handling
thiserror = "2.0"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# HTTP client
reqwest = { version = "0.12", features = ["json"] }

# System monitoring
sysinfo = "0.31"

[dev-dependencies]
# Testing
tokio-test = "0.4"
axum-test = "15.7"