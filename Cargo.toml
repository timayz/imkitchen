[workspace]
members = [
    "crates/imkitchen-core",
    "crates/imkitchen-web",
    "crates/imkitchen-shared",
]
resolver = "2"

[workspace.dependencies]
# Web Framework
axum = "0.8"
askama = "0.14"
tower = "0.5"
tower-http = "0.6"

# Database
sqlx = { version = "0.8", features = ["runtime-tokio-rustls", "sqlite", "uuid", "chrono", "migrate"] }

# Async Runtime
tokio = { version = "1.0", features = ["full"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Configuration
config = { version = "0.15", features = ["toml"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error Handling
thiserror = "2.0"
anyhow = "1.0"

# Events (disabled due to compilation issues)
# evento = "1.1"

# Internationalization
rust-i18n = "3"

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Development Dependencies (moved to workspace.dependencies for easier access)
# [workspace.dev-dependencies]
# tokio-test = "0.4"
# rstest = "0.23"

[profile.dev]
debug = true

[profile.release]
lto = true
codegen-units = 1
strip = true