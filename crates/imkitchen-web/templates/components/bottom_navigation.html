<!-- Progressive Enhancement Script for Active State Management -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Update active navigation state based on current page
    const currentPath = window.location.pathname;
    const navItems = document.querySelectorAll('[data-nav-item]');
    
    navItems.forEach(item => {
        const href = item.getAttribute('href');
        const navItem = item.getAttribute('data-nav-item');
        
        // Remove any existing active classes
        item.classList.remove('text-kitchen-600', 'bg-kitchen-50');
        
        // Determine if this nav item should be active
        let isActive = false;
        
        if (currentPath === '/' && navItem === 'home') {
            isActive = true;
        } else if (currentPath.startsWith('/recipes') && navItem === 'recipes') {
            isActive = true;
        } else if (currentPath.startsWith('/meal-plans') && navItem === 'meal-plans') {
            isActive = true;
        } else if (currentPath.startsWith('/shopping') && navItem === 'shopping') {
            isActive = true;
        }
        
        // Apply active state
        if (isActive) {
            item.classList.add('text-kitchen-600', 'bg-kitchen-50');
            item.setAttribute('aria-current', 'page');
        } else {
            item.removeAttribute('aria-current');
        }
    });
    
    // Add haptic-like feedback for touch interactions
    navItems.forEach(item => {
        item.addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.95)';
        }, { passive: true });
        
        item.addEventListener('touchend', function() {
            this.style.transform = 'scale(1)';
        }, { passive: true });
        
        item.addEventListener('touchcancel', function() {
            this.style.transform = 'scale(1)';
        }, { passive: true });
    });
});
</script>
