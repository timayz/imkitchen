<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Smart meal planning for busy families with PWA support">
<meta name="theme-color" content="#10b981">

<!-- PWA Manifest -->
<link rel="manifest" href="/static/manifest.json">

<!-- Apple Touch Icon -->
<link rel="apple-touch-icon" href="/static/images/icons/icon-192x192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="imkitchen">

<!-- Microsoft Tiles -->
<meta name="msapplication-TileImage" content="/static/images/icons/icon-144x144.png">
<meta name="msapplication-TileColor" content="#10b981">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/static/images/icons/icon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/static/images/icons/icon-16x16.png">

<!-- Preload critical resources -->
<link rel="preload" href="/static/css/tailwind.css" as="style">
<link rel="preload" href="/static/js/twinspark.js" as="script">
<link rel="preload" href="/static/js/app-v2.js" as="script">

<!-- Stylesheets -->
<link rel="stylesheet" href="/static/css/tailwind.css">

<title>{% block title %}imkitchen - Smart Meal Planning{% endblock %}</title>
