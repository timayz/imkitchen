<form id="login-form" ts-req="/login" ts-target="#login-form" ts-req-method="post">
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ email }}">
        <div class="error" id="email-error">{{ email_error }}</div>
    </div>
    
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" value="">
        <div class="error" id="password-error">{{ password_error }}</div>
    </div>
    
    <button type="submit" class="btn">Login</button>
    
    <div class="success" id="login-success"></div>
    <div class="error" id="login-error">{{ error_message }}</div>
</form>
