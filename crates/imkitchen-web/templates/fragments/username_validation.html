<!-- Username availability validation response fragment for TwinSpark -->
<div id="username-validation-result" class="mt-2">
    {% if has_error %}
        <div class="text-red-600 text-sm">
            <span class="inline-flex items-center">
                <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                </svg>
                {{ error }}
            </span>
        </div>
    {% else %}
        {% if available %}
            <div class="text-green-600 text-sm">
                <span class="inline-flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path>
                    </svg>
                    Username is available
                </span>
            </div>
        {% else %}
            <div class="text-red-600 text-sm">
                <span class="inline-flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path>
                    </svg>
                    Username is not available
                </span>
            </div>
            {% if suggestions.len() > 0 %}
                <div class="mt-2 text-sm text-gray-600">
                    <p class="mb-1">Try these alternatives:</p>
                    <ul class="list-disc list-inside space-y-1">
                        {% for suggestion in suggestions %}
                            <li class="text-blue-600 cursor-pointer hover:underline" 
                                onclick="document.getElementById('username').value='{{ suggestion }}'">
                                {{ suggestion }}
                            </li>
                        {% endfor %}
                    </ul>
                </div>
            {% endif %}
        {% endif %}
    {% endif %}
</div>
