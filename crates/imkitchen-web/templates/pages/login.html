<!DOCTYPE html>
<html lang="en">
<head>
    {% include "partials/head.html" %}
    <title>Login - imkitchen</title>
</head>
<body class="bg-gray-50">
    <!-- Skip to main content for accessibility -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 bg-green-600 text-white px-4 py-2 rounded-md z-50">
        Skip to main content
    </a>

    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <!-- Header -->
            <div class="text-center">
                <div class="flex justify-center">
                    <img src="/static/images/icons/icon-64x64.png" alt="imkitchen logo" class="h-16 w-16">
                </div>
                <h1 class="mt-6 text-3xl font-bold text-gray-900">Welcome back</h1>
                <p class="mt-2 text-sm text-gray-600">
                    Sign in to your imkitchen account
                </p>
            </div>

            <!-- Login Form -->
            <div class="bg-white rounded-lg shadow-sm border border-gray-200 px-6 py-8 sm:px-10">
                <form id="login-form" ts-req="/login" ts-target="#login-response" ts-req-method="post" class="space-y-6">
                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                            Email Address
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            autocomplete="email"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 
                                   focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 
                                   min-h-[44px] text-base sm:text-sm"
                            placeholder="Enter your email address"
                        >
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                            Password
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required 
                            autocomplete="current-password"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 
                                   focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 
                                   min-h-[44px] text-base sm:text-sm"
                            placeholder="Enter your password"
                        >
                    </div>

                    <!-- Remember me and Forgot password -->
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between space-y-3 sm:space-y-0">
                        <div class="flex items-center">
                            <input 
                                id="remember-me" 
                                name="remember-me" 
                                type="checkbox" 
                                class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded"
                            >
                            <label for="remember-me" class="ml-2 block text-sm text-gray-700">
                                Remember me
                            </label>
                        </div>
                        <div>
                            <a href="/forgot-password" class="text-sm text-green-600 hover:text-green-500 focus:outline-none focus:ring-2 focus:ring-green-500 rounded px-1 py-1">
                                Forgot your password?
                            </a>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div>
                        <button 
                            type="submit" 
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm 
                                   text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 
                                   focus:ring-offset-2 focus:ring-green-500 min-h-[44px] font-medium text-base
                                   disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-200"
                        >
                            <span class="login-text">Sign in</span>
                            <svg class="login-spinner animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </div>

                    <!-- Response area for TwinSpark -->
                    <div id="login-response"></div>
                </form>

                <!-- Register Link -->
                <div class="mt-6 text-center">
                    <p class="text-sm text-gray-600">
                        Don't have an account?
                        <a href="/register" class="font-medium text-green-600 hover:text-green-500 focus:outline-none focus:ring-2 focus:ring-green-500 rounded px-1 py-1">
                            Sign up for free
                        </a>
                    </p>
                </div>
            </div>

            <!-- PWA Install Prompt (if available) -->
            <div id="pwa-install-prompt" class="hidden bg-blue-50 border border-blue-200 rounded-lg p-4 text-center">
                <p class="text-sm text-blue-800 mb-3">Install imkitchen for a better experience!</p>
                <button id="pwa-install-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md text-sm min-h-[44px] focus:outline-none focus:ring-2 focus:ring-blue-500">
                    Install App
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    {% include "partials/scripts.html" %}

    <!-- Form enhancement script -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('login-form');
        const submitButton = form.querySelector('button[type="submit"]');
        const loginText = submitButton.querySelector('.login-text');
        const loginSpinner = submitButton.querySelector('.login-spinner');
        
        // Handle form submission loading state
        form.addEventListener('submit', function() {
            submitButton.disabled = true;
            loginText.textContent = 'Signing in...';
            loginSpinner.classList.remove('hidden');
        });
        
        // Reset form state on response
        form.addEventListener('ts:after-request', function(event) {
            submitButton.disabled = false;
            loginText.textContent = 'Sign in';
            loginSpinner.classList.add('hidden');
            
            // Announce result to screen readers
            const response = event.detail.response;
            if (response.ok) {
                window.imkitchen?.announceToScreenReader('Login successful');
            } else {
                window.imkitchen?.announceToScreenReader('Login failed');
            }
        });
        
        // Focus management
        const firstInput = form.querySelector('input[type="email"]');
        if (firstInput) {
            firstInput.focus();
        }
    });
    </script>
</body>
</html>
