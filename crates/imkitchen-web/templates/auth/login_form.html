<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IMKitchen</title>
    <script src="/static/js/twinspark.js"></script>
    <link href="/static/css/tailwind.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full space-y-8">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                Sign in to IMKitchen
            </h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                Welcome back! Please sign in to your account
            </p>
        </div>
        
        {% if !general_error.is_empty() %}
        <div class="rounded-md bg-red-50 p-4">
            <div class="text-sm text-red-700">{{ general_error }}</div>
        </div>
        {% endif %}
        
        <form class="mt-8 space-y-6" ts-req="/auth/login" ts-target="#login-result">
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="email" class="sr-only">Email address</label>
                    <input id="email" 
                           name="email" 
                           type="email" 
                           autocomplete="email" 
                           required 
                           class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" 
                           placeholder="Email address"
                           ts-req="/auth/validate-login" 
                           ts-target="#email-errors"
                           ts-trigger="blur">
                    <div id="email-errors" class="text-red-600 text-sm mt-1"></div>
                </div>
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" 
                           name="password" 
                           type="password" 
                           autocomplete="current-password" 
                           required 
                           class="appearance-none rounded-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm" 
                           placeholder="Password"
                           ts-req="/auth/validate-login" 
                           ts-target="#password-errors"
                           ts-trigger="blur">
                    <div id="password-errors" class="text-red-600 text-sm mt-1"></div>
                </div>
            </div>

            <div>
                <button type="submit" 
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Sign in
                </button>
            </div>
        </form>
        
        <div id="login-result"></div>
        
        <div class="text-center">
            <a href="/auth/register" class="text-indigo-600 hover:text-indigo-500">
                Don't have an account? Sign up
            </a>
        </div>
    </div>
</body>
</html>
