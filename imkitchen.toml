[database]
url = "sqlite:imkitchen.db"
max_connections = 10
min_connections = 1
connection_timeout = 30
acquire_timeout = 30
idle_timeout = 600
max_lifetime = 3600
auto_migrate = true

[server]
host = "0.0.0.0"
port = 3000
request_timeout = 30
max_body_size = 16777216
enable_cors = false
shutdown_timeout = 30

[logging]
level = "info"
format = "pretty"
rotation = "daily"
structured = true
console = true
file = true

[security]
session_secret = "a6000bef7c814698b5fc51c807132b0749f5b1f4f9874e92bff30463903e533d"
session_timeout = 3600
force_https = false
trusted_proxies = []
rate_limit_per_minute = 60

[monitoring]
enable_metrics = true
metrics_endpoint = "/metrics"
health_endpoint = "/health"
enable_tracing = true
metrics_interval = 30
