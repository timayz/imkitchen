apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: imkitchen-deployment
  labels:
    app: imkitchen
spec:
  serviceName: imkitchen
  replicas: 1
  selector:
    matchLabels:
      app: imkitchen
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: imkitchen
    spec:
      hostname: {{ .Values.hostname | quote }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 90 }}
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
      {{- if or .Values.database.migrate .Values.database.reset .Values.litestream.enabled }}
      initContainers:
        {{- if .Values.litestream.enabled }}
        # Rebuild the DB from S3 only if it is missing locally (fresh disk / DR). No-op on
        # a populated volume. Runs before migrate so migrate always sees a real database.
        - name: litestream-restore
          image: {{ .Values.litestream.image | quote }}
          imagePullPolicy: IfNotPresent
          # The litestream image runs as root by default; the pod enforces runAsNonRoot.
          # Run as uid/gid 10001 (matches fsGroup) so it satisfies the policy and can
          # read/write the SQLite files the app owns.
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
          command:
            ["litestream", "restore", "-if-db-not-exists", "-if-replica-exists", "-config", "/etc/litestream/litestream.yml", "/var/lib/imkitchen/db.sqlite3"]
          volumeMounts:
            - name: litestream-config
              readOnly: true
              mountPath: /etc/litestream
            - name: data
              mountPath: /var/lib/imkitchen
          envFrom:
            - secretRef:
                name: {{ .Values.litestream.secretName | quote }}
        {{- end }}
        {{- if or .Values.database.migrate .Values.database.reset }}
        # Runs after restore and BEFORE the Litestream sidecar starts, so its
        # wal_checkpoint(TRUNCATE) cannot disrupt a live Litestream generation.
        - name: imkitchen-migrate
          image: timayz/imkitchen:{{ .Values.image.tag }}
          imagePullPolicy: IfNotPresent
          command:
            ["imkitchen", {{ if .Values.database.reset }}"reset"{{ else }}"migrate"{{ end }}, "--config", "/etc/imkitchen/config.toml"]
          volumeMounts:
            - name: config
              readOnly: true
              mountPath: /etc/imkitchen
            - name: data
              mountPath: /var/lib/imkitchen
          envFrom:
            - secretRef:
                name: imkitchen-env
        {{- end }}
        {{- if .Values.litestream.enabled }}
        # Native sidecar (restartPolicy: Always). Placed last among initContainers so it
        # starts AFTER migrate; Kubernetes keeps it running through the main container
        # phase and terminates it AFTER the app on shutdown, letting it do a final S3 sync.
        - name: litestream
          image: {{ .Values.litestream.image | quote }}
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          # See litestream-restore: run as non-root uid/gid 10001 (matches fsGroup).
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
          command:
            ["litestream", "replicate", "-config", "/etc/litestream/litestream.yml"]
          volumeMounts:
            - name: litestream-config
              readOnly: true
              mountPath: /etc/litestream
            - name: data
              mountPath: /var/lib/imkitchen
          envFrom:
            - secretRef:
                name: {{ .Values.litestream.secretName | quote }}
        {{- end }}
      {{- end }}
      containers:
        - name: imkitchen
          image: timayz/imkitchen:{{ .Values.image.tag }}
          imagePullPolicy: IfNotPresent
          command:
            ["imkitchen", "serve", "--config", "/etc/imkitchen/config.toml"]
          volumeMounts:
            - name: config
              readOnly: true
              mountPath: /etc/imkitchen
            - name: data
              mountPath: /var/lib/imkitchen
          envFrom:
            - secretRef:
                name: imkitchen-env
          ports:
            - containerPort: 3000
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: imkitchen-config
        {{- if .Values.litestream.enabled }}
        - name: litestream-config
          configMap:
            name: imkitchen-litestream
        {{- end }}

  volumeClaimTemplates:
    - metadata:
        name: data
        {{- if .Values.persistence.longhornCritical }}
        labels:
          recurring-job-group.longhorn.io/critical: enabled
        {{- end }}
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
