apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: imkitchen-deployment
  labels:
    app: imkitchen
spec:
  serviceName: imkitchen
  replicas: 1
  selector:
    matchLabels:
      app: imkitchen
  updateStrategy:
    rollingUpdate:
      partition: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: imkitchen
    spec:
      hostname: {{ .Values.hostname | quote }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 90 }}
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        runAsNonRoot: true
      {{- if or .Values.database.migrate .Values.database.reset }}
      initContainers:
        - name: imkitchen-migrate
          image: timayz/imkitchen:{{ .Values.image.tag }}
          imagePullPolicy: IfNotPresent
          command:
            ["imkitchen", {{ if .Values.database.reset }}"reset"{{ else }}"migrate"{{ end }}, "--config", "/etc/imkitchen/config.toml"]
          volumeMounts:
            - name: config
              readOnly: true
              mountPath: /etc/imkitchen
            - name: data
              mountPath: /var/lib/imkitchen
          envFrom:
            - secretRef:
                name: imkitchen-env
      {{- end }}
      containers:
        - name: imkitchen
          image: timayz/imkitchen:{{ .Values.image.tag }}
          imagePullPolicy: IfNotPresent
          command:
            ["imkitchen", "serve", "--config", "/etc/imkitchen/config.toml"]
          volumeMounts:
            - name: config
              readOnly: true
              mountPath: /etc/imkitchen
            - name: data
              mountPath: /var/lib/imkitchen
          envFrom:
            - secretRef:
                name: imkitchen-env
          ports:
            - containerPort: 3000
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: imkitchen-config

  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          recurring-job-group.longhorn.io/critical: enabled
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: "longhorn"
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
