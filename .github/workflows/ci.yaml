name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - "**/Cargo.toml"
      - "Cargo.lock"

jobs:
  test:
    uses: timayz/.github/.github/workflows/rust-test.yml@v3
    with:
      tests: '["cargo test -p imkitchen-core", "cargo test -p imkitchen-billing", "cargo test -p imkitchen-identity", "cargo test -p imkitchen-notification", "cargo test -p imkitchen"]'
