name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  DATABASE_URL: sqlite:imkitchen.db

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: "lint"
        
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.4
      
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Run clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      env:
        RUSTC_WRAPPER: sccache

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
        
    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: "test"
        
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.4
        
    - name: Cache SQLx CLI
      id: cache-sqlx
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/sqlx
        key: ${{ runner.os }}-sqlx-${{ env.SQLX_VERSION }}
        restore-keys: |
          ${{ runner.os }}-sqlx-
      env:
        SQLX_VERSION: 0.8.0
        
    - name: Install SQLx CLI
      if: steps.cache-sqlx.outputs.cache-hit != 'true'
      run: cargo install sqlx-cli --version ${{ env.SQLX_VERSION }} --no-default-features --features sqlite
      env:
        SQLX_VERSION: 0.8.0
        RUSTC_WRAPPER: sccache
        
    - name: Create database
      run: sqlx database create
      
    - name: Run database migrations
      run: sqlx migrate run
      
    - name: Run tests
      run: cargo test --workspace --all-features --jobs $(nproc)
      env:
        RUSTC_WRAPPER: sccache

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
        
    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        
    - name: Cache SQLx CLI
      id: cache-sqlx
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/sqlx
        key: ${{ runner.os }}-sqlx-${{ env.SQLX_VERSION }}
        restore-keys: |
          ${{ runner.os }}-sqlx-
      env:
        SQLX_VERSION: 0.8.0
        
    - name: Install SQLx CLI
      if: steps.cache-sqlx.outputs.cache-hit != 'true'
      run: cargo install sqlx-cli --version ${{ env.SQLX_VERSION }} --no-default-features --features sqlite
      env:
        SQLX_VERSION: 0.8.0
        
    - name: Create database
      run: sqlx database create
      
    - name: Run database migrations
      run: sqlx migrate run
        
    - name: Cache cargo-tarpaulin
      id: cache-tarpaulin
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/cargo-tarpaulin
        key: ${{ runner.os }}-tarpaulin-${{ env.TARPAULIN_VERSION }}
      env:
        TARPAULIN_VERSION: 0.30.0
        
    - name: Install cargo-tarpaulin
      if: steps.cache-tarpaulin.outputs.cache-hit != 'true'
      run: cargo install cargo-tarpaulin --version ${{ env.TARPAULIN_VERSION }}
      env:
        TARPAULIN_VERSION: 0.30.0
      
    - name: Generate coverage report
      run: cargo tarpaulin --workspace --all-features --out xml --output-dir coverage/
      
    - name: Check coverage threshold (>80%)
      run: |
        COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' coverage/cobertura.xml | head -1)
        COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc -l)
        echo "Coverage: ${COVERAGE_PERCENT}%"
        if (( $(echo "$COVERAGE < 0.80" | bc -l) )); then
          echo "Coverage ${COVERAGE_PERCENT}% is below 80% threshold"
          exit 1
        fi
        echo "Coverage check passed: ${COVERAGE_PERCENT}%"

  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        
    - name: Build release binary
      run: cargo build --release --workspace
      
    - name: Check binary size
      run: |
        BINARY_SIZE=$(stat -f%z target/release/imkitchen 2>/dev/null || stat -c%s target/release/imkitchen)
        echo "Binary size: ${BINARY_SIZE} bytes"
        # Fail if binary exceeds 100MB (reasonable limit)
        if [ $BINARY_SIZE -gt 104857600 ]; then
          echo "Binary size ${BINARY_SIZE} exceeds 100MB limit"
          exit 1
        fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Cache SQLx CLI
      id: cache-sqlx-docker
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/sqlx
        key: ${{ runner.os }}-sqlx-${{ env.SQLX_VERSION }}
        restore-keys: |
          ${{ runner.os }}-sqlx-
      env:
        SQLX_VERSION: 0.8.0
        
    - name: Install SQLx CLI
      if: steps.cache-sqlx-docker.outputs.cache-hit != 'true'
      run: cargo install sqlx-cli --version ${{ env.SQLX_VERSION }} --no-default-features --features sqlite
      env:
        SQLX_VERSION: 0.8.0
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        load: true
        tags: imkitchen:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        
    - name: Setup test database
      run: |
        # Create test database directory
        mkdir -p /tmp/docker-test-data
        
        # Create and migrate database using SQLx CLI
        export DATABASE_URL="sqlite:/tmp/docker-test-data/imkitchen.db"
        sqlx database create
        sqlx migrate run
        
        # Set permissions
        chmod 644 /tmp/docker-test-data/imkitchen.db
        
    - name: Test Docker container
      run: |
        # Start container in background with database volume and environment
        docker run -d --name test-container -p 3000:3000 \
          -v /tmp/docker-test-data:/data \
          -e ENVIRONMENT=production \
          -e DATABASE_URL=sqlite:/data/imkitchen.db \
          -e RUST_LOG=info \
          imkitchen:test
        
        # Wait for container to be healthy with retries
        echo "Waiting for container to be ready..."
        for i in {1..30}; do
          if docker exec test-container ps aux | grep -q imkitchen; then
            echo "Container process is running, testing health endpoint..."
            if curl -f --max-time 5 --retry 3 --retry-delay 2 http://localhost:3000/health; then
              echo "✅ Health check passed"
              break
            fi
          fi
          echo "Attempt $i/30: Container not ready yet, waiting 2 seconds..."
          sleep 2
          
          if [ $i -eq 30 ]; then
            echo "❌ Container failed to become healthy"
            echo "Container logs:"
            docker logs test-container
            exit 1
          fi
        done
        
        # Stop container
        docker stop test-container
        docker rm test-container