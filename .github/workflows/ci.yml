name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: sqlite:imkitchen.db

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Install SQLx CLI
      run: cargo install sqlx-cli --no-default-features --features sqlite
      
    - name: Run database migrations
      run: sqlx migrate run
      
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Run clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      
    - name: Run tests
      run: cargo test --workspace --all-features
      
    - name: Install cargo-tarpaulin for coverage
      run: cargo install cargo-tarpaulin
      
    - name: Generate coverage report
      run: cargo tarpaulin --workspace --all-features --out xml --output-dir coverage/
      
    - name: Check coverage threshold (>80%)
      run: |
        COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' coverage/cobertura.xml | head -1)
        COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc -l)
        echo "Coverage: ${COVERAGE_PERCENT}%"
        if (( $(echo "$COVERAGE < 0.80" | bc -l) )); then
          echo "Coverage ${COVERAGE_PERCENT}% is below 80% threshold"
          exit 1
        fi
        echo "Coverage check passed: ${COVERAGE_PERCENT}%"

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
          
    - name: Build release binary
      run: cargo build --release --workspace
      
    - name: Check binary size
      run: |
        BINARY_SIZE=$(stat -f%z target/release/imkitchen-web 2>/dev/null || stat -c%s target/release/imkitchen-web)
        echo "Binary size: ${BINARY_SIZE} bytes"
        # Fail if binary exceeds 100MB (reasonable limit)
        if [ $BINARY_SIZE -gt 104857600 ]; then
          echo "Binary size ${BINARY_SIZE} exceeds 100MB limit"
          exit 1
        fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: imkitchen:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Test Docker container
      run: |
        # Start container in background
        docker run -d --name test-container -p 3000:3000 imkitchen:test
        
        # Wait for container to start
        sleep 10
        
        # Test health endpoint
        curl -f http://localhost:3000/health || exit 1
        
        # Stop container
        docker stop test-container
        docker rm test-container