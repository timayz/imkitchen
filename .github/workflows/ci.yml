name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  DATABASE_URL: sqlite:imkitchen.db

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: "lint"
        
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.4
      
    - name: Check formatting
      run: cargo fmt --all -- --check
      
    - name: Run clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      env:
        RUSTC_WRAPPER: sccache

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
        
    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        shared-key: "test"
        
    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.4
        
    - name: Cache SQLx CLI
      id: cache-sqlx
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/sqlx
        key: ${{ runner.os }}-sqlx-${{ env.SQLX_VERSION }}
        restore-keys: |
          ${{ runner.os }}-sqlx-
      env:
        SQLX_VERSION: 0.8.0
        
    - name: Install SQLx CLI
      if: steps.cache-sqlx.outputs.cache-hit != 'true'
      run: cargo install sqlx-cli --version ${{ env.SQLX_VERSION }} --no-default-features --features sqlite
      env:
        SQLX_VERSION: 0.8.0
        RUSTC_WRAPPER: sccache
        
    - name: Cache cargo-nextest
      id: cache-nextest
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/cargo-nextest
        key: ${{ runner.os }}-nextest-${{ env.NEXTEST_VERSION }}
      env:
        NEXTEST_VERSION: 0.9.68
        
    - name: Install cargo-nextest
      if: steps.cache-nextest.outputs.cache-hit != 'true'
      run: cargo install cargo-nextest --version ${{ env.NEXTEST_VERSION }}
      env:
        NEXTEST_VERSION: 0.9.68
        RUSTC_WRAPPER: sccache
      
    - name: Create database
      run: sqlx database create
      
    - name: Run database migrations
      run: sqlx migrate run
      
    - name: Run tests with nextest
      run: cargo nextest run --workspace --all-features --jobs $(nproc)
      env:
        RUSTC_WRAPPER: sccache

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
        
    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        
    - name: Cache SQLx CLI
      id: cache-sqlx
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/sqlx
        key: ${{ runner.os }}-sqlx-${{ env.SQLX_VERSION }}
        restore-keys: |
          ${{ runner.os }}-sqlx-
      env:
        SQLX_VERSION: 0.8.0
        
    - name: Install SQLx CLI
      if: steps.cache-sqlx.outputs.cache-hit != 'true'
      run: cargo install sqlx-cli --version ${{ env.SQLX_VERSION }} --no-default-features --features sqlite
      env:
        SQLX_VERSION: 0.8.0
        
    - name: Create database
      run: sqlx database create
      
    - name: Run database migrations
      run: sqlx migrate run
        
    - name: Cache cargo-tarpaulin
      id: cache-tarpaulin
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/cargo-tarpaulin
        key: ${{ runner.os }}-tarpaulin-${{ env.TARPAULIN_VERSION }}
      env:
        TARPAULIN_VERSION: 0.30.0
        
    - name: Install cargo-tarpaulin
      if: steps.cache-tarpaulin.outputs.cache-hit != 'true'
      run: cargo install cargo-tarpaulin --version ${{ env.TARPAULIN_VERSION }}
      env:
        TARPAULIN_VERSION: 0.30.0
      
    - name: Generate coverage report
      run: cargo tarpaulin --workspace --all-features --out xml --output-dir coverage/
      
    - name: Check coverage threshold (>80%)
      run: |
        COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' coverage/cobertura.xml | head -1)
        COVERAGE_PERCENT=$(echo "$COVERAGE * 100" | bc -l)
        echo "Coverage: ${COVERAGE_PERCENT}%"
        if (( $(echo "$COVERAGE < 0.80" | bc -l) )); then
          echo "Coverage ${COVERAGE_PERCENT}% is below 80% threshold"
          exit 1
        fi
        echo "Coverage check passed: ${COVERAGE_PERCENT}%"

  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      
    - name: Setup Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        
    - name: Build release binary
      run: cargo build --release --workspace
      
    - name: Check binary size
      run: |
        BINARY_SIZE=$(stat -f%z target/release/imkitchen-web 2>/dev/null || stat -c%s target/release/imkitchen-web)
        echo "Binary size: ${BINARY_SIZE} bytes"
        # Fail if binary exceeds 100MB (reasonable limit)
        if [ $BINARY_SIZE -gt 104857600 ]; then
          echo "Binary size ${BINARY_SIZE} exceeds 100MB limit"
          exit 1
        fi

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: imkitchen:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
        
    - name: Test Docker container
      run: |
        # Start container in background
        docker run -d --name test-container -p 3000:3000 imkitchen:test
        
        # Wait for container to start
        sleep 10
        
        # Test health endpoint
        curl -f http://localhost:3000/health || exit 1
        
        # Stop container
        docker stop test-container
        docker rm test-container