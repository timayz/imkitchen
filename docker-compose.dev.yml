version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: imkitchen_app_dev
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/imkitchen_dev
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_jwt_secret_key_change_in_production
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
      - RUST_LOG=debug
      - ENVIRONMENT=development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - cargo_cache:/usr/local/cargo/registry
      - target_cache:/app/target
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17
    container_name: imkitchen_postgres_dev
    environment:
      POSTGRES_DB: imkitchen_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d imkitchen_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8.2-alpine
    container_name: imkitchen_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  cargo_cache:
    driver: local
  target_cache:
    driver: local

networks:
  default:
    name: imkitchen_dev_network