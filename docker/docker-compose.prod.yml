version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: imkitchen-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - VERCEL_ANALYTICS_ID=${VERCEL_ANALYTICS_ID:-}
    depends_on:
      - postgres
      - redis
    networks:
      - imkitchen-network
    volumes:
      - app-uploads:/app/uploads
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.imkitchen.rule=Host(`${DOMAIN:-localhost}`)'
      - 'traefik.http.routers.imkitchen.tls.certresolver=letsencrypt'
      - 'traefik.http.services.imkitchen.loadbalancer.server.port=3000'

  postgres:
    image: postgres:15-alpine
    container_name: imkitchen-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-imkitchen}
      - POSTGRES_USER=${POSTGRES_USER:-imkitchen}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - imkitchen-network
    ports:
      - '5432:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-imkitchen} -d ${POSTGRES_DB:-imkitchen}',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: imkitchen-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - imkitchen-network
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 30s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: imkitchen-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - imkitchen-network
    labels:
      - 'traefik.enable=false'

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  app-uploads:
    driver: local
  nginx-cache:
    driver: local

networks:
  imkitchen-network:
    driver: bridge
    name: imkitchen-network
